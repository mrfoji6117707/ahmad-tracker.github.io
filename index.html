<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline Learning Tracker - Ahmad</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <style>
    body {
      background-color: #f8f9fa;
      transition: background-color 0.3s, color 0.3s;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body.dark-mode {
      background-color: #212529;
      color: #e9ecef;
    }

    body.dark-mode .card {
      background-color: #343a40;
      border-color: #495057;
      color: #e9ecef;
    }

    body.dark-mode .card-title,
    body.dark-mode h5,
    body.dark-mode h6 {
      color: #f8f9fa;
    }

    body.dark-mode .btn-secondary,
    body.dark-mode .btn-info {
      color: #fff;
    }

    body.dark-mode .badge.bg-info {
      background-color: #0d6efd !important;
    }

    .progress {
      height: 25px;
      margin-top: 10px;
      background-color: #dee2e6;
    }

    .progress-bar {
      background-color: #198754;
      transition: width 0.6s ease;
    }

    .badge {
      font-size: 1rem;
      padding: 0.5em 0.8em;
      min-width: 70px;
      text-align: center;
    }

    .badge.exceeded {
      background-color: #dc3545 !important;
      color: white;
    }

    .mt-2, .mb-2 {
      margin: 0.5rem 0;
    }

    .card-body {
      padding: 1.5rem;
    }

    h1 {
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .btn {
      font-weight: 500;
    }

    small {
      color: #6c757d;
    }

    body.dark-mode small {
      color: #adb5bd;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <h1 class="text-center">Welcome, Ahmad</h1>

  <div class="row justify-content-center">
    <div class="col-md-8">

      <!-- Current Time -->
      <div class="card mb-3">
        <div class="card-body text-center">
          <h5>Current Time: <span id="current-time"></span></h5>
        </div>
      </div>

      <!-- Shift Controls -->
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">Daily Shift</h5>
          <button id="start-shift" class="btn btn-success me-2">Start Shift</button>
          <button id="end-shift" class="btn btn-danger me-2" disabled>End Shift</button>
          <button id="reset-day" class="btn btn-warning">Reset Today</button>

          <div id="shift-timer-container" class="mt-2" style="display: none;">
            <h6>Shift Timer: <span id="shift-timer">00:00:00</span></h6>
          </div>

          <div class="mt-3">
            <h6>Total Time Today: <span id="total-time">0 hours</span> 
                (<span id="progress-percent">0%</span> of goal)</h6>
            <div class="progress">
              <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
            </div>
            <small>Goal: 12 hours (including 1 hour breaks)</small>
          </div>
        </div>
      </div>

      <!-- Breaks -->
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">Breaks (30 min each max)</h5>

          <div class="mb-2">
            <button id="start-break1" class="btn btn-primary me-2">Start Break 1</button>
            <button id="end-break1" class="btn btn-secondary me-2" disabled>End Break 1</button>
            <span id="break1-timer" class="badge bg-info">00:00</span>
          </div>

          <div class="mb-2">
            <button id="start-break2" class="btn btn-primary me-2">Start Break 2</button>
            <button id="end-break2" class="btn btn-secondary me-2" disabled>End Break 2</button>
            <span id="break2-timer" class="badge bg-info">00:00</span>
          </div>

          <div id="break-status" class="mt-2"></div>

          <h6>Total Break Time: <span id="total-break-time">0 hours</span> 
              (<span id="break-percent">0%</span> of 1-hour allowance)</h6>
        </div>
      </div>

      <!-- History & Export -->
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">View Past Performance</h5>
          <input type="date" id="history-date" class="form-control mb-2">
          <button id="view-history" class="btn btn-info me-2">View Total for Date</button>
          <button id="export-csv" class="btn btn-success">Export All Data to CSV</button>
          <div id="history-result" class="mt-3"></div>
        </div>
      </div>

      <!-- Dark Mode -->
      <div class="text-center">
        <button id="toggle-dark-mode" class="btn btn-secondary">Toggle Dark Mode</button>
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const STORAGE_KEY = 'learningTrackerData';
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

  let shiftStart = null;
  let shiftInterval = null;
  let break1Start = null;
  let break1Interval = null;
  let break1Duration = 0; // seconds
  let break2Start = null;
  let break2Interval = null;
  let break2Duration = 0; // seconds
  let totalBreakSeconds = 0;

  const getDateKey = (date) => date.toISOString().split('T')[0];

  const formatTime = (seconds, includeHours = true) => {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    if (includeHours) {
      return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  };

  // Load today's data
  const todayKey = getDateKey(new Date());
  if (!data[todayKey]) {
    data[todayKey] = { total: 0, break1: 0, break2: 0 }; // hours
  } else {
    break1Duration = Math.round(data[todayKey].break1 * 3600);
    break2Duration = Math.round(data[todayKey].break2 * 3600);
    totalBreakSeconds = break1Duration + break2Duration;
    updateTotalTime(data[todayKey].total);
    updateBreakStatus();
    updateBreakDisplay();

    if (data[todayKey].total > 0) {
      disableAllControls();
    }
  }

  function disableAllControls() {
    document.getElementById('start-shift').disabled = true;
    document.getElementById('end-shift').disabled = true;
    document.getElementById('start-break1').disabled = true;
    document.getElementById('end-break1').disabled = true;
    document.getElementById('start-break2').disabled = true;
    document.getElementById('end-break2').disabled = true;
  }

  // Live clock
  function updateCurrentTime() {
    document.getElementById('current-time').textContent = new Date().toLocaleString();
  }
  setInterval(updateCurrentTime, 1000);
  updateCurrentTime();

  // ────────────────────────────────────────────────
  // Start Shift
  document.getElementById('start-shift').onclick = () => {
    if (shiftStart) return;
    shiftStart = new Date();
    document.getElementById('start-shift').disabled = true;
    document.getElementById('end-shift').disabled = false;
    document.getElementById('shift-timer-container').style.display = 'block';

    let shiftSeconds = 0;
    shiftInterval = setInterval(() => {
      shiftSeconds++;
      document.getElementById('shift-timer').textContent = formatTime(shiftSeconds);
      const liveHours = (shiftSeconds + totalBreakSeconds) / 3600;
      updateTotalTime(liveHours);
    }, 1000);

    alert('Shift started! Stay focused, Ahmad!');
  };

  // End Shift
  document.getElementById('end-shift').onclick = () => {
    if (!shiftStart) return;
    const end = new Date();
    const shiftSeconds = Math.round((end - shiftStart) / 1000);
    const totalSeconds = shiftSeconds + totalBreakSeconds;
    const totalHours = totalSeconds / 3600;

    data[todayKey].total  = totalHours;
    data[todayKey].break1 = break1Duration / 3600;
    data[todayKey].break2 = break2Duration / 3600;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    clearInterval(shiftInterval);
    updateTotalTime(totalHours);
    disableAllControls();

    if (totalHours >= 12) {
      alert('Excellent work, Ahmad! You hit or exceeded your 12-hour goal today.');
    } else {
      alert(`Shift ended. Total: ${totalHours.toFixed(2)} hours. Tomorrow is another chance!`);
    }
  };

  function updateTotalTime(hours) {
    document.getElementById('total-time').textContent = `${hours.toFixed(2)} hours`;
    const progress = Math.min((hours / 12) * 100, 100);
    document.getElementById('progress-percent').textContent = `${progress.toFixed(0)}%`;
    document.getElementById('progress-bar').style.width = `${progress}%`;
  }

  // ────────────────────────────────────────────────
  // Break 1
  document.getElementById('start-break1').onclick = () => {
    if (!shiftStart) return alert('Please start your shift first.');
    if (break1Start) return;
    break1Start = new Date();
    document.getElementById('start-break1').disabled = true;
    document.getElementById('end-break1').disabled = false;

    let breakSeconds = 0;
    break1Interval = setInterval(() => {
      breakSeconds++;
      document.getElementById('break1-timer').textContent = formatTime(breakSeconds, false);
      if (breakSeconds > 1800) document.getElementById('break1-timer').classList.add('exceeded');
    }, 1000);
  };

  document.getElementById('end-break1').onclick = () => {
    if (!break1Start) return;
    const end = new Date();
    break1Duration = Math.round((end - break1Start) / 1000);
    totalBreakSeconds += break1Duration;
    clearInterval(break1Interval);
    document.getElementById('end-break1').disabled = true;
    if (break1Duration > 1800) alert('Break 1 exceeded 30 minutes. Time to get back!');
    updateBreakStatus();
    updateBreakDisplay();
    break1Start = null;
  };

  // Break 2
  document.getElementById('start-break2').onclick = () => {
    if (!shiftStart) return alert('Please start your shift first.');
    if (break2Start) return;
    break2Start = new Date();
    document.getElementById('start-break2').disabled = true;
    document.getElementById('end-break2').disabled = false;

    let breakSeconds = 0;
    break2Interval = setInterval(() => {
      breakSeconds++;
      document.getElementById('break2-timer').textContent = formatTime(breakSeconds, false);
      if (breakSeconds > 1800) document.getElementById('break2-timer').classList.add('exceeded');
    }, 1000);
  };

  document.getElementById('end-break2').onclick = () => {
    if (!break2Start) return;
    const end = new Date();
    break2Duration = Math.round((end - break2Start) / 1000);
    totalBreakSeconds += break2Duration;
    clearInterval(break2Interval);
    document.getElementById('end-break2').disabled = true;
    if (break2Duration > 1800) alert('Break 2 exceeded 30 minutes. Time to get back!');
    updateBreakStatus();
    updateBreakDisplay();
    break2Start = null;
  };

  function updateBreakDisplay() {
    const breakHours = totalBreakSeconds / 3600;
    document.getElementById('total-break-time').textContent = `${breakHours.toFixed(2)} hours`;
    const percent = Math.min((breakHours / 1) * 100, 100);
    document.getElementById('break-percent').textContent = `${percent.toFixed(0)}%`;
  }

  function updateBreakStatus() {
    const el = document.getElementById('break-status');
    el.innerHTML = `
      Break 1: ${break1Duration > 0 ? `${(break1Duration / 3600).toFixed(2)} h` : 'Not Taken'}<br>
      Break 2: ${break2Duration > 0 ? `${(break2Duration / 3600).toFixed(2)} h` : 'Not Taken'}
    `;
    if (break1Duration > 1800) document.getElementById('break1-timer').classList.add('exceeded');
    if (break2Duration > 1800) document.getElementById('break2-timer').classList.add('exceeded');
  }

  // ────────────────────────────────────────────────
  // Reset
  document.getElementById('reset-day').onclick = () => {
    if (confirm('Reset today’s data?')) {
      delete data[todayKey];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      location.reload();
    }
  };

  // View history
  document.getElementById('view-history').onclick = () => {
    const selected = document.getElementById('history-date').value;
    if (!selected) return alert('Please select a date.');
    const key = getDateKey(new Date(selected));
    const day = data[key];
    const result = document.getElementById('history-result');

    if (day && day.total > 0) {
      const breakTotal = day.break1 + day.break2;
      result.innerHTML = `
        <strong>${selected}</strong><br>
        Total: ${day.total.toFixed(2)} h (${((day.total/12)*100).toFixed(0)}%)<br>
        Break 1: ${day.break1.toFixed(2)} h<br>
        Break 2: ${day.break2.toFixed(2)} h<br>
        Breaks total: ${breakTotal.toFixed(2)} h (${((breakTotal/1)*100).toFixed(0)}%)
      `;
    } else {
      result.innerHTML = 'No data for selected date.';
    }
  };

  // Export CSV
  document.getElementById('export-csv').onclick = () => {
    if (Object.keys(data).length === 0) {
      alert('No data to export yet.');
      return;
    }

    let csv = 'Date,Total Hours (incl. breaks),Break 1 Hours,Break 2 Hours\n';

    Object.keys(data).sort().forEach(date => {
      const entry = data[date];
      if (entry.total > 0) {
        csv += `${date},${entry.total.toFixed(2)},${entry.break1.toFixed(2)},${entry.break2.toFixed(2)}\n`;
      }
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `learning-tracker-${new Date().toISOString().split('T')[0]}.csv`;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  };

  // Dark mode toggle
  document.getElementById('toggle-dark-mode').onclick = () => {
    document.body.classList.toggle('dark-mode');
  };
});
</script>

<!-- Bootstrap JS (for any components that might need it, though we mostly use plain JS here) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
